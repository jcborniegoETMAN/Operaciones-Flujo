<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>TEST — Sheet Personal</title>
  <style>
    body { background:#0d0f14; color:#e2e8f0; font-family:monospace; padding:2rem; }
    #log { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Test de conexión — Sheet personal</h2>
  <div id="log">Cargando…</div>

<script src="etman-data-test.js?v=99"></script>
<script>
const SUC = window.ETMAN.SUC;
const SUC_COLORS = window.ETMAN.SUC_COLORS;
const log = document.getElementById('log');
log.textContent += '\nSUC y SUC_COLORS declarados sin error.\n';

window.ETMAN.loadETMANData().then(data => {
  log.textContent += '\n✅ ÉXITO — datos cargados:\n';
  log.textContent += JSON.stringify({ latestDate: data.latestDate, allDates: data.allDates }, null, 2);
}).catch(err => {
  log.textContent += '\n❌ ERROR al cargar:\n' + err.message;
});
</script>
</body>
</html>
