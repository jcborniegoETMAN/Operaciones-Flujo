<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETMAN — Flujo de Mercadería</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --bg-buf:    #120f1a;
      --bg-flujo:  #0f141a;
      --border:    #1e2433;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --dim:       #3a4460;
      --panel:     #1a1f2e;
      --panel-bd:  #2a2f3d;
      --chip-bg:   #141820;
      --chip-bd:   #252d3d;
      --chip-txt:  #94a3b8;
      --row-line:  #141820;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body.light-mode {
      --bg:        #f4f5f8;
      --bg-buf:    #ffffff;
      --bg-flujo:  #ffffff;
      --border:    #dde1ea;
      --text:      #1a202c;
      --muted:     #64748b;
      --dim:       #94a3b8;
      --panel:     #ffffff;
      --panel-bd:  #dde1ea;
      --chip-bg:   #ffffff;
      --chip-bd:   #dde1ea;
      --chip-txt:  #475569;
      --row-line:  #eef0f5;
    }
    body.light-mode .buf-cell,
    body.light-mode .suc-header,
    body.light-mode .hist-badge {
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-left { display: flex; align-items: baseline; gap: 1rem; }
    .brand { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #4fc3f7; letter-spacing: .15em; text-transform: uppercase; }
    .subtitle { font-size: 13px; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .mode-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel); border: 0.5px solid var(--panel-bd); border-radius: 8px;
      padding: 6px 14px; font-family: var(--sans); font-size: 12px;
      color: var(--chip-txt); cursor: pointer; text-decoration: none; transition: all .2s;
    }
    button.mode-btn { font: inherit; outline: none; }
    .mode-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
    .mode-dot { width: 6px; height: 6px; border-radius: 50%; background: #4fc3f7; }

    /* DATE PICKER */
    .date-wrap {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel); border: 0.5px solid var(--panel-bd); border-radius: 8px; padding: 5px 12px;
    }
    .date-wrap label { font-family: var(--mono); font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
    #date-input { background: transparent; border: none; font-family: var(--mono); font-size: 11px; color: var(--text); cursor: pointer; outline: none; color-scheme: dark; }

    /* HISTORICAL BADGE */
    .hist-badge {
      display: none; align-items: center; gap: 6px;
      background: #1c1400; border: 0.5px solid #78350f; border-radius: 6px;
      padding: 4px 10px; font-family: var(--mono); font-size: 10px; color: #f59e0b; letter-spacing: .06em;
    }
    .hist-badge.visible { display: flex; }
    .hist-dot { width: 5px; height: 5px; border-radius: 50%; background: #f59e0b; }

    /* FILTER BAR */
    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .filter-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-lbl { font-family: var(--mono); font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; white-space: nowrap; }
    .filter-sep { width: 0.5px; height: 20px; background: var(--border); margin: 0 6px; }

    .suc-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--chip-bg); border: 0.5px solid var(--chip-bd); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--chip-txt);
      cursor: pointer; transition: all .18s; user-select: none;
    }
    .suc-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; opacity: .5; transition: opacity .18s; }
    .suc-chip.active { border-color: currentColor; color: var(--text); }
    .suc-chip.active .chip-dot { opacity: 1; }
    .suc-chip:hover { border-color: #4fc3f7; color: var(--text); }

    #kpi-select {
      background: var(--chip-bg); border: 0.5px solid var(--chip-bd); border-radius: 8px;
      padding: 5px 10px; font-family: var(--sans); font-size: 11px; color: var(--chip-txt);
      cursor: pointer; outline: none; color-scheme: dark; transition: border-color .18s;
    }
    #kpi-select:focus { border-color: #4fc3f7; color: var(--text); }

    /* SCROLL / BOARD */
    .scroll-wrap { overflow-x: auto; padding-bottom: 1.5rem; }
    .board { display: inline-grid; align-items: start; }

    .suc-header { text-align: center; padding: 0 8px 22px; transition: opacity .25s; }
    .suc-header.dimmed { opacity: .15; pointer-events: none; }
    .suc-name { font-size: 13px; font-weight: 600; }
    .suc-tag { font-family: var(--mono); font-size: 9px; color: var(--dim); margin-top: 3px; }

    .row-label { display: flex; flex-direction: column; justify-content: center; padding: 0 18px 0 0; }
    .rl-type { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 3px; }
    .rl-type.buffer { color: #a78bfa; }
    .rl-type.flujo  { color: #4fc3f7; }
    .rl-name { font-size: 11px; font-weight: 600; color: var(--text); }

    .board-row-wrap { transition: opacity .25s; }
    .board-row-wrap.dimmed { opacity: .12; pointer-events: none; }
    .board-cell { padding: 4px 0; transition: opacity .25s; }
    .board-cell.dimmed { opacity: .12; pointer-events: none; }

    /* BUFFER CELLS */
    .buf-cell { border-radius: 10px; padding: 16px 18px; }
    .metric-pair   { display: flex; gap: 18px; margin-bottom: 10px; }
    .metric-pair-3 { display: flex; gap: 12px; margin-bottom: 10px; }
    .metric { flex: 1; }
    .metric-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; }
    .metric-lbl { font-size: 9px; color: var(--dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }
    .mdivider { width: 0.5px; background: var(--border); }

    .extra-row { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .conv-row { display: flex; gap: 14px; }
    .conv-val { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--chip-txt); }
    .conv-lbl { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

    .aging { display: flex; align-items: center; gap: 6px; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .aging-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .aging-val { font-family: var(--mono); font-size: 10px; font-weight: 700; }
    .aging-lbl { font-size: 9px; color: var(--dim); }

    .cap-bar-wrap { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .cap-bar-lbl  { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .cap-bar-txt  { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
    .cap-bar-pct  { font-family: var(--mono); font-size: 10px; font-weight: 700; }
    .cap-bar-bg   { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cap-bar-fill { height: 100%; border-radius: 2px; }

    .demora-badge { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .d-ok   { background: #0a1f12; color: #22c55e; border: 0.5px solid #14532d; }
    .d-warn { background: #1c1400; color: #f59e0b; border: 0.5px solid #78350f; }
    .d-crit { background: #1c0404; color: #ef4444; border: 0.5px solid #7f1d1d; }

    /* FLUJO */
    .flujo-data { display: flex; flex-direction: column; gap: 2px; }
    .fd-val { font-family: var(--mono); font-size: 12px; font-weight: 700; line-height: 1; }
    .fd-lbl { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }

    /* FLOW ANIMATIONS — live only */
    @keyframes flowAnim { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

    body:not(.historical) .fl-ok {
      background: repeating-linear-gradient(to bottom, #22c55e 0, #22c55e 18px, #0d3320 18px, #0d3320 28px);
      background-size: 4px 40px; animation: flowAnim .45s linear infinite;
    }
    body:not(.historical) .fl-warn {
      background: repeating-linear-gradient(to bottom, #f59e0b 0, #f59e0b 16px, #2a1a00 16px, #2a1a00 28px);
      background-size: 4px 40px; animation: flowAnim 1.3s linear infinite;
    }
    body:not(.historical) .fl-crit {
      background: repeating-linear-gradient(to bottom, #ef4444 0, #ef4444 14px, #2a0000 14px, #2a0000 28px);
      background-size: 4px 40px; animation: flowAnim 3s linear infinite;
    }

    /* Static flow lines — historical */
    body.historical .fl-ok   { background: repeating-linear-gradient(to bottom, #22c55e 0, #22c55e 18px, #0d3320 18px, #0d3320 28px); background-size: 4px 40px; opacity:.7; }
    body.historical .fl-warn { background: repeating-linear-gradient(to bottom, #f59e0b 0, #f59e0b 16px, #2a1a00 16px, #2a1a00 28px); background-size: 4px 40px; opacity:.7; }
    body.historical .fl-crit { background: repeating-linear-gradient(to bottom, #ef4444 0, #ef4444 14px, #2a0000 14px, #2a0000 28px); background-size: 4px 40px; opacity:.7; }

    /* LEGEND */
    .legend { display: flex; gap: 24px; margin-top: 1.4rem; padding-top: 1rem; border-top: 0.5px solid var(--border); justify-content: flex-end; flex-wrap: wrap; align-items: center; }
    .legend-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
    .legend-group { display: flex; align-items: center; gap: 12px; }
    .legend-item  { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--chip-txt); }
    .legend-dot   { width: 7px; height: 7px; border-radius: 50%; }
    .legend-sep   { width: 0.5px; height: 20px; background: var(--border); }

    .last-update { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: .5rem; text-align: right; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="brand">ETMAN</span>
      <span class="subtitle">Flujo de Mercadería — Red Completa</span>
    </div>
    <div class="header-right">
      <div class="hist-badge" id="hist-badge">
        <div class="hist-dot"></div>CIERRE HISTÓRICO
      </div>
      <div class="date-wrap">
        <label for="date-input">Fecha</label>
        <input type="date" id="date-input" />
      </div>
      <button class="mode-btn" id="theme-toggle" type="button">
        <div class="mode-dot" id="theme-dot" style="background:#facc15;"></div><span id="theme-label">Modo claro</span>
      </button>
      <a class="mode-btn" href="reporte.html">
        <div class="mode-dot" style="background:#a78bfa;"></div>Reportería
      </a>
      <a class="mode-btn" href="mapa.html">
        <div class="mode-dot"></div>Ver flujos intersucursales
      </a>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-lbl">Sucursal</span>
    <div class="filter-section" id="suc-chips"></div>
    <div class="filter-sep"></div>
    <span class="filter-lbl">Etapa</span>
    <select id="kpi-select">
      <option value="all">Todas las etapas</option>
      <option value="tBuf">Tránsito inbound</option>
      <option value="rec">Recepción</option>
      <option value="rBuf">Buffer RECEP</option>
      <option value="guard">Guardado</option>
      <option value="pBuf">Pedidos pendientes</option>
      <option value="pick">Picking</option>
      <option value="audit">Auditoría</option>
      <option value="desp">Despacho</option>
    </select>
  </div>

  <div class="scroll-wrap">
    <div id="board" class="board"></div>
  </div>

  <div class="legend">
    <span class="legend-title">Buffer →</span>
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;opacity:.35;"></div>Holgado</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>Atención</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div>Saturado</div>
    </div>
    <div class="legend-sep"></div>
    <span class="legend-title">Flujo →</span>
    <div class="legend-group">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div>Alto</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>Medio</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div>Bajo</div>
    </div>
  </div>

  <p class="last-update" id="last-update"></p>

<script src="etman-data.js?v=4"></script>
<script>
/* SUC y SUC_COLORS ya existen como variables globales (las declara etman-data.js).
   No se redeclaran acá para evitar colisión de scope global. */

/* HELPERS */
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function agingTxt(v) { return v === 0 ? 'Hoy' : v === 1 ? '1 día' : `${v} días`; }
function bufStyle(sat) {
  if (sat < 75) return { border:'#a78bfa44', glow:'#a78bfa22', bar:'#7c3aed', pct:'#a78bfa' };
  if (sat < 90) return { border:'#f59e0b55', glow:'#f59e0b22', bar:'#f59e0b', pct:'#f59e0b' };
  return { border:'#ef444466', glow:'#ef444422', bar:'#ef4444', pct:'#ef4444' };
}
function flujoClass(cap) { return cap >= 90 ? 'fl-ok' : cap >= 50 ? 'fl-warn' : 'fl-crit'; }
function flujoColor(cap) { return cap >= 90 ? '#22c55e' : cap >= 50 ? '#f59e0b' : '#ef4444'; }

function capBar(pct, col, label) {
  return `<div class="cap-bar-wrap">
    <div class="cap-bar-lbl"><span class="cap-bar-txt">${label}</span><span class="cap-bar-pct" style="color:${col.pct}">${pct}%</span></div>
    <div class="cap-bar-bg"><div class="cap-bar-fill" style="width:${pct}%;background:${col.bar};"></div></div>
  </div>`;
}
function mp2(L, U) {
  return `<div class="metric-pair">
    <div class="metric"><div class="metric-val">${fmt(L)}</div><div class="metric-lbl">Líneas</div></div>
    <div class="mdivider"></div>
    <div class="metric"><div class="metric-val">${fmt(U)}</div><div class="metric-lbl">Unidades</div></div>
  </div>`;
}

/* BUILDERS */
function buildTBuf(d) {
  const c = bufStyle(d.sat);
  const ds = d.demora === 0 ? 'd-ok' : d.demora <= 2 ? 'd-warn' : 'd-crit';
  const dTxt = d.demora === 0 ? 'Al día' : `+${d.demora}d`;
  return `<div class="buf-cell" style="background:var(--bg-buf);border:1.5px solid ${c.border};box-shadow:0 0 10px ${c.glow};">
    ${mp2(d.L, d.U)}
    <div class="extra-row">
      <div class="conv-row">
        <div><div class="conv-val">${d.cajas}</div><div class="conv-lbl">Cajas</div></div>
        <div><div class="conv-val">${d.pallets}</div><div class="conv-lbl">Pallets</div></div>
      </div>
      <span class="demora-badge ${ds}">${dTxt}</span>
    </div>
    ${capBar(d.sat, c, 'Saturación')}
  </div>`;
}
function buildRBuf(d) {
  const c = bufStyle(d.sat);
  return `<div class="buf-cell" style="background:var(--bg-buf);border:1.5px solid ${c.border};box-shadow:0 0 10px ${c.glow};">
    ${mp2(d.L, d.U)}${capBar(d.sat, c, 'Saturación')}
  </div>`;
}
function buildPBuf(d) {
  const c = bufStyle(d.sat);
  const aC = d.dias <= 1 ? '#22c55e' : d.dias <= 4 ? '#f59e0b' : '#ef4444';
  return `<div class="buf-cell" style="background:var(--bg-buf);border:1.5px solid ${c.border};box-shadow:0 0 10px ${c.glow};">
    <div class="metric-pair-3">
      <div class="metric"><div class="metric-val">${d.ped}</div><div class="metric-lbl">Pedidos</div></div>
      <div class="mdivider"></div>
      <div class="metric"><div class="metric-val">${fmt(d.L)}</div><div class="metric-lbl">Líneas</div></div>
      <div class="mdivider"></div>
      <div class="metric"><div class="metric-val">${fmt(d.U)}</div><div class="metric-lbl">Unidades</div></div>
    </div>
    <div class="aging">
      <div class="aging-dot" style="background:${aC};"></div>
      <span class="aging-val" style="color:${aC};">${agingTxt(d.dias)}</span>
      <span class="aging-lbl">&nbsp;pedido más antiguo</span>
    </div>
    ${capBar(d.sat, c, 'Saturación')}
  </div>`;
}
function flujoRow(leftVal, leftLbl, rightVal, rightLbl, cap, extraLeft, extraRight) {
  const fc = flujoClass(cap), col = flujoColor(cap);
  return `
  <div style="display:flex;align-items:center;padding:10px 0;">
    <div class="flujo-data" style="flex:1;align-items:flex-end;padding:0 12px;">
      <span class="fd-val" style="color:${col};">${leftVal}</span><span class="fd-lbl">${leftLbl}</span>${extraLeft||''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;width:16px;height:70px;flex-shrink:0;">
      <div class="${fc}" style="width:4px;flex:1;border-radius:3px;overflow:hidden;"></div>
    </div>
    <div class="flujo-data" style="flex:1;align-items:flex-start;padding:0 12px;">
      <span class="fd-val" style="color:${col};">${rightVal}</span><span class="fd-lbl">${rightLbl}</span>${extraRight||''}
    </div>
  </div>
  <div style="padding:0 10px 8px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;">Capacidad</span>
      <span style="font-family:var(--mono);font-size:9px;font-weight:700;color:${col};">${cap}%</span>
    </div>
    <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
      <div style="width:${cap}%;height:100%;background:${col};border-radius:2px;"></div>
    </div>
  </div>`;
}
const xtra = v => `<span style="font-family:var(--mono);font-size:10px;color:var(--chip-txt);">${v}</span>`;
function buildRec(d)   { return flujoRow(fmt(d.L),'Líneas',fmt(d.U),'Unidades',d.cap); }
function buildGuard(d) { return flujoRow(fmt(d.L),'Líneas',fmt(d.U),'Unidades',d.cap); }
function buildPick(d)  { return flujoRow(fmt(d.L),'Líneas',fmt(d.U),'Unidades',d.cap,xtra(`${d.ped} ped`)); }
function buildAudit(d) { return flujoRow(fmt(d.L),'Líneas',fmt(d.U),'Unidades',d.cap,xtra(`${d.ped} ped`)); }
function buildDesp(d)  { return flujoRow(fmt(d.L),'Líneas',fmt(d.U),'Unidades',d.cap,xtra(`${d.ped} ped`),xtra(`${d.bultos}B / ${d.pallets}P`)); }

const ROWS = [
  { key:'tBuf',  type:'buffer', name:'Tránsito inbound',  build: d => buildTBuf(d.tBuf)  },
  { key:'rec',   type:'flujo',  name:'Recepción',          build: d => buildRec(d.rec)    },
  { key:'rBuf',  type:'buffer', name:'RECEP',              build: d => buildRBuf(d.rBuf)  },
  { key:'guard', type:'flujo',  name:'Guardado',           build: d => buildGuard(d.guard)},
  { key:'pBuf',  type:'buffer', name:'Pedidos pendientes', build: d => buildPBuf(d.pBuf)  },
  { key:'pick',  type:'flujo',  name:'Picking',            build: d => buildPick(d.pick)  },
  { key:'audit', type:'flujo',  name:'Auditoría',          build: d => buildAudit(d.audit)},
  { key:'desp',  type:'flujo',  name:'Despacho',           build: d => buildDesp(d.desp)  },
];

/* STATE */
let activeSuc = new Set(SUC.map((_,i) => i));
let activeKpi = 'all';
let ETMAN_DATA = null; // se llena tras loadETMANData()

function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function getData(dateStr) {
  if (!ETMAN_DATA) return null;
  return ETMAN_DATA.byDate[dateStr] || null;
}

/* BOARD */
const LABEL_W = 160, COL_W = 210, GAP = 18, N = SUC.length;
const board = document.getElementById('board');
board.style.gridTemplateColumns = `${LABEL_W}px repeat(${N}, ${COL_W}px)`;
board.style.gap = `0 ${GAP}px`;

function buildBoard(data) {
  board.innerHTML = '';
  board.appendChild(document.createElement('div'));
  SUC.forEach((s, i) => {
    const h = document.createElement('div');
    h.className = 'suc-header';
    h.dataset.sucIdx = i;
    h.innerHTML = `<div class="suc-name" style="color:${SUC_COLORS[i]}">${s.name}</div><div class="suc-tag">${s.tag}</div>`;
    board.appendChild(h);
  });
  ROWS.forEach(row => {
    const lbl = document.createElement('div');
    lbl.className = 'board-row-wrap';
    lbl.dataset.rowKey = row.key;
    lbl.style.cssText = 'display:flex;align-items:center;padding:4px 0;';
    lbl.innerHTML = `<div class="row-label">
      <div class="rl-type ${row.type}">${row.type==='buffer'?'▣ Buffer':'▷ Flujo'}</div>
      <div class="rl-name">${row.name}</div>
    </div>`;
    board.appendChild(lbl);
    data.forEach((d, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'board-cell';
      wrap.dataset.sucIdx = i;
      wrap.dataset.rowKey = row.key;
      wrap.style.cssText = 'padding:4px 0;';
      wrap.innerHTML = d ? row.build(d) : `<div style="padding:1.4rem 0;text-align:center;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.05em;">SIN DATO</div>`;
      board.appendChild(wrap);
    });
  });
}

function applyFilters() {
  document.querySelectorAll('.suc-header[data-suc-idx]').forEach(el => {
    el.classList.toggle('dimmed', !activeSuc.has(+el.dataset.sucIdx));
  });
  document.querySelectorAll('.board-row-wrap[data-row-key]').forEach(el => {
    el.classList.toggle('dimmed', activeKpi !== 'all' && el.dataset.rowKey !== activeKpi);
  });
  document.querySelectorAll('.board-cell[data-suc-idx]').forEach(el => {
    const sucOk = activeSuc.has(+el.dataset.sucIdx);
    const kpiOk = activeKpi === 'all' || el.dataset.rowKey === activeKpi;
    el.classList.toggle('dimmed', !sucOk || !kpiOk);
  });
}

/* DATE */
const dateInput  = document.getElementById('date-input');
const histBadge  = document.getElementById('hist-badge');
const lastUpdate = document.getElementById('last-update');
const diasN  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const mesesN = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function renderForDate(dateStr) {
  const isLive = dateStr === ETMAN_DATA.latestDate;
  const data   = getData(dateStr);
  if (!data) {
    board.innerHTML = `<div style="grid-column:1/-1;padding:3rem 2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.05em;">SIN DATOS PARA ${dateStr}</div>`;
    document.body.classList.add('historical');
    histBadge.classList.add('visible');
    lastUpdate.textContent = `Cierre histórico: ${dateStr} — sin datos`;
    return;
  }
  buildBoard(data);
  applyFilters();
  if (isLive) {
    document.body.classList.remove('historical');
    histBadge.classList.remove('visible');
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    lastUpdate.textContent = `Último cierre cargado: ${dateStr} · vista actualizada ${hh}:${mm}`;
  } else {
    document.body.classList.add('historical');
    histBadge.classList.add('visible');
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    lastUpdate.textContent = `Cierre histórico: ${diasN[dt.getDay()]} ${d} ${mesesN[m-1]} ${y}`;
  }
}
dateInput.addEventListener('change', () => renderForDate(dateInput.value));

/* CHIPS */
const chipsWrap = document.getElementById('suc-chips');
const allChip = document.createElement('span');
allChip.className = 'suc-chip active';
allChip.innerHTML = `<span class="chip-dot" style="background:#64748b;"></span>Todas`;
allChip.addEventListener('click', () => {
  activeSuc = new Set(SUC.map((_,i) => i));
  updateChips(); applyFilters();
});
chipsWrap.appendChild(allChip);

const sucChips = [];
SUC.forEach((s, i) => {
  const chip = document.createElement('span');
  chip.className = 'suc-chip active';
  chip.style.color = SUC_COLORS[i];
  chip.innerHTML = `<span class="chip-dot" style="background:${SUC_COLORS[i]};"></span>${s.name}`;
  chip.addEventListener('click', () => {
    if (activeSuc.has(i) && activeSuc.size === 1) return;
    activeSuc.has(i) ? activeSuc.delete(i) : activeSuc.add(i);
    updateChips(); applyFilters();
  });
  chipsWrap.appendChild(chip);
  sucChips.push(chip);
});

function updateChips() {
  allChip.classList.toggle('active', activeSuc.size === SUC.length);
  sucChips.forEach((c,i) => c.classList.toggle('active', activeSuc.has(i)));
}

/* KPI FILTER */
document.getElementById('kpi-select').addEventListener('change', function() {
  activeKpi = this.value; applyFilters();
});

/* INIT */
board.innerHTML = `<div style="grid-column:1/-1;padding:3rem 2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.05em;">CARGANDO DATOS DESDE GOOGLE SHEETS…</div>`;

window.ETMAN.loadETMANData().then(data => {
  ETMAN_DATA = data;
  if (!ETMAN_DATA.latestDate) {
    board.innerHTML = `<div style="grid-column:1/-1;padding:3rem 2rem;text-align:center;color:#ef4444;font-family:var(--mono);font-size:12px;letter-spacing:.05em;">LA HOJA "datos_operativos" NO TIENE FILAS CARGADAS</div>`;
    return;
  }
  dateInput.max   = ETMAN_DATA.latestDate;
  dateInput.value = ETMAN_DATA.latestDate;
  renderForDate(ETMAN_DATA.latestDate);
}).catch(err => {
  console.error(err);
  board.innerHTML = `<div style="grid-column:1/-1;padding:3rem 2rem;text-align:center;color:#ef4444;font-family:var(--mono);font-size:11px;letter-spacing:.03em;">ERROR AL LEER LA GOOGLE SHEET<br><span style="color:var(--dim);font-size:10px;">${err.message}</span></div>`;
});

/* THEME TOGGLE */
const themeBtn   = document.getElementById('theme-toggle');
const themeDot   = document.getElementById('theme-dot');
const themeLabel = document.getElementById('theme-label');

function applyTheme(light) {
  document.body.classList.toggle('light-mode', light);
  themeDot.style.background = light ? '#475569' : '#facc15';
  themeLabel.textContent = light ? 'Modo oscuro' : 'Modo claro';
}
const savedTheme = localStorage.getItem('etman-theme');
applyTheme(savedTheme === 'light');

themeBtn.addEventListener('click', () => {
  const isLight = !document.body.classList.contains('light-mode');
  applyTheme(isLight);
  localStorage.setItem('etman-theme', isLight ? 'light' : 'dark');
});
</script>
</body>
</html>
