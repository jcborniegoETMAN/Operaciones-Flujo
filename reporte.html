<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETMAN — Reportería Operativa</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0f14;
      --bg2:     #111520;
      --bg3:     #141820;
      --border:  #1e2433;
      --border2: #252d3d;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --dim:     #3a4460;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }
    body.light-mode {
      --bg:      #f4f5f8;
      --bg2:     #ffffff;
      --bg3:     #f8f9fb;
      --border:  #dde1ea;
      --border2: #dde1ea;
      --text:    #1a202c;
      --muted:   #64748b;
      --dim:     #94a3b8;
    }
    body.light-mode .card,
    body.light-mode .panel { box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    body { padding: 1.5rem; }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.8rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .header-left { display: flex; align-items: baseline; gap: 1rem; }
    .brand { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #4fc3f7; letter-spacing: .15em; text-transform: uppercase; }
    .subtitle { font-size: 13px; color: var(--muted); }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px;
      padding: 6px 14px; font-family: var(--sans); font-size: 12px;
      color: var(--muted); cursor: pointer; text-decoration: none; transition: all .2s;
    }
    button.nav-btn { font: inherit; outline: none; }
    .nav-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; align-items: start; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* PANEL */
    .panel {
      background: var(--bg2); border: 0.5px solid var(--border2);
      border-radius: 12px; padding: 1.2rem; position: sticky; top: 1.5rem;
    }
    .panel-title {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: #4fc3f7; letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 0.5px solid var(--border);
    }
    .field { margin-bottom: 1.1rem; }
    .field-lbl {
      font-family: var(--mono); font-size: 9px; color: var(--dim);
      text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; display: block;
    }

    /* CHIPS */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 16px;
      padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all .18s; user-select: none;
    }
    .chip .cdot { width: 5px; height: 5px; border-radius: 50%; opacity: .4; transition: opacity .18s; }
    .chip.active { border-color: currentColor; color: var(--text); }
    .chip.active .cdot { opacity: 1; }

    /* FASE CHIPS — colores según tipo */
    .chip.buf { color: #a78bfa; }
    .chip.buf.active { border-color: #a78bfa; }
    .chip.flu { color: #4fc3f7; }
    .chip.flu.active { border-color: #4fc3f7; }

    /* DATE RANGE */
    .date-row { display: flex; gap: 8px; }
    .date-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .date-field label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; }
    .date-field input[type=date] {
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px;
      padding: 6px 8px; font-family: var(--mono); font-size: 11px; color: var(--text);
      outline: none; color-scheme: dark; width: 100%;
      transition: border-color .18s;
    }
    .date-field input[type=date]:focus { border-color: #4fc3f7; }

    /* GENERATE BTN */
    .gen-btn {
      width: 100%; margin-top: .8rem;
      background: #0e2a3d; border: 0.5px solid #1e5f8a; border-radius: 8px;
      padding: 10px; font-family: var(--mono); font-size: 11px; font-weight: 700;
      color: #4fc3f7; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
    }
    .gen-btn:hover { background: #123650; border-color: #4fc3f7; }
    .gen-btn:disabled { opacity: .5; cursor: not-allowed; }
    .gen-btn:disabled:hover { background: #0e2a3d; border-color: #1e5f8a; }

    /* CONTENT AREA */
    .content { display: flex; flex-direction: column; gap: 1.4rem; }

    /* EMPTY STATE */
    .empty {
      background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 12px;
      padding: 4rem 2rem; text-align: center;
      font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: .06em;
    }

    /* SECTION CARD */
    .card {
      background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 12px;
      padding: 1.4rem;
    }
    .card-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1.2rem; }
    .card-title { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: .06em; }
    .card-sub { font-size: 11px; color: var(--dim); }

    /* CHART */
    .chart-wrap { position: relative; height: 260px; }

    /* ALERT TABLE */
    .alert-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .alert-table th {
      font-family: var(--mono); font-size: 9px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 6px 10px; border-bottom: 0.5px solid var(--border);
      text-align: left;
    }
    .alert-table td { padding: 8px 10px; border-bottom: 0.5px solid #141820; }
    .alert-table tr:last-child td { border-bottom: none; }
    .alert-table tr:hover td { background: var(--bg3); }

    .suc-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .badge-warn { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: #1c1400; color: #f59e0b; border: 0.5px solid #78350f; }
    .badge-crit { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: #1c0404; color: #ef4444; border: 0.5px solid #7f1d1d; }
    .badge-ok   { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: #0a1f12; color: #22c55e; border: 0.5px solid #14532d; }

    /* THRESHOLD NOTE */
    .thresh-note {
      display: flex; gap: 16px; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .thresh-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--dim); }
    .thresh-line { width: 20px; height: 2px; border-radius: 1px; }
    .thresh-dashed { background: repeating-linear-gradient(to right, currentColor 0, currentColor 4px, transparent 4px, transparent 8px); }

    /* SUMMARY ROW */
    .summary-row { display: flex; gap: 1rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .summary-kpi {
      flex: 1; min-width: 100px;
      background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px;
      padding: .8rem 1rem;
    }
    .skpi-val { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; }
    .skpi-lbl { font-size: 10px; color: var(--dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

    .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="brand">ETMAN</span>
    <span class="subtitle">Reportería Operativa</span>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="nav-btn" id="theme-toggle" type="button">
      <span id="theme-icon">🌙</span><span id="theme-label">Modo claro</span>
    </button>
    <a class="nav-btn" href="index.html">← Flujo en vivo</a>
    <a class="nav-btn" href="mapa.html">Mapa intersucursal</a>
  </div>
</div>

<div class="layout">

  <!-- PANEL DE INPUTS -->
  <div class="panel">
    <div class="panel-title">Parámetros del reporte</div>

    <div class="field">
      <span class="field-lbl">Sucursales</span>
      <div class="chips" id="suc-chips"></div>
    </div>

    <div class="field">
      <span class="field-lbl">Fases</span>
      <div class="chips" id="fase-chips"></div>
    </div>

    <div class="field">
      <span class="field-lbl">Período</span>
      <div class="date-row">
        <div class="date-field">
          <label for="fecha-desde">Desde</label>
          <input type="date" id="fecha-desde" />
        </div>
        <div class="date-field">
          <label for="fecha-hasta">Hasta</label>
          <input type="date" id="fecha-hasta" />
        </div>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn" disabled>Cargando datos…</button>
  </div>

  <!-- CONTENIDO -->
  <div class="content" id="content">
    <div class="empty" id="empty-state">
      Seleccioná sucursales, fases y un período para generar el reporte.
    </div>
  </div>

</div>

<script src="etman-data.js"></script>
<script>
/* ══════════════════════════════════════════════
   DATOS — cargados desde Google Sheets vía etman-data.js
   ══════════════════════════════════════════════ */
const SUC = window.ETMAN.SUC.map((s, i) => ({ ...s, color: window.ETMAN.SUC_COLORS[i] }));

const FASES = [
  { key:'tBuf',  label:'Tránsito inbound',  tipo:'buf', metrica:'sat',  umbrales:{warn:75, crit:90},  unidad:'%', desc:'Saturación' },
  { key:'rec',   label:'Recepción',          tipo:'flu', metrica:'cap',  umbrales:{warn:50, crit:90},  unidad:'%', desc:'Capacidad', invertido:true },
  { key:'rBuf',  label:'Buffer RECEP',       tipo:'buf', metrica:'sat',  umbrales:{warn:75, crit:90},  unidad:'%', desc:'Saturación' },
  { key:'guard', label:'Guardado',           tipo:'flu', metrica:'cap',  umbrales:{warn:50, crit:90},  unidad:'%', desc:'Capacidad', invertido:true },
  { key:'pBuf',  label:'Pedidos pendientes', tipo:'buf', metrica:'sat',  umbrales:{warn:75, crit:90},  unidad:'%', desc:'Saturación' },
  { key:'pick',  label:'Picking',            tipo:'flu', metrica:'cap',  umbrales:{warn:50, crit:90},  unidad:'%', desc:'Capacidad', invertido:true },
  { key:'audit', label:'Auditoría',          tipo:'flu', metrica:'cap',  umbrales:{warn:50, crit:90},  unidad:'%', desc:'Capacidad', invertido:true },
  { key:'desp',  label:'Despacho',           tipo:'flu', metrica:'cap',  umbrales:{warn:50, crit:90},  unidad:'%', desc:'Capacidad', invertido:true },
];

// Para flujos: alerta = capacidad BAJA (flujo insuficiente)
// warn = línea de medio (90%), crit = línea de bajo (50%) → invertido
// Para buffers: alerta = saturación ALTA
// warn = sat >= 50%, crit = sat >= 75%

let ALL_DATES_DATA = {}; // se llena tras loadETMANData()

/* ══════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════ */
function dateRange(desde, hasta) {
  const dates = [];
  let cur = new Date(desde + 'T00:00:00');
  const end = new Date(hasta + 'T00:00:00');
  while (cur <= end) {
    const s = cur.toISOString().slice(0,10);
    dates.push(s);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function getMetrica(dayData, sucIdx, faseKey, metrica) {
  const row = dayData[sucIdx];
  if (!row) return null;
  const fase = row[faseKey];
  if (!fase) return null;
  return fase[metrica] ?? null;
}

// Para flujos: alerta si cap < 90 (medio/atención) o < 50 (bajo/crítico)
// Para buffers: alerta si sat >= 75 (atención) o >= 90 (saturado/crítico)
function alertLevel(val, fase) {
  if (val === null) return 'sin datos';
  if (fase.tipo === 'buf') {
    if (val >= fase.umbrales.crit) return 'crit';
    if (val >= fase.umbrales.warn) return 'warn';
    return 'ok';
  } else {
    // invertido: bajo es malo
    if (val < fase.umbrales.warn) return 'crit';
    if (val < fase.umbrales.crit) return 'warn';
    return 'ok';
  }
}

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(day)} ${meses[parseInt(m)-1]}`;
}

/* ══════════════════════════════════════════════
   ESTADO DE SELECCIÓN
   ══════════════════════════════════════════════ */
let selSuc  = new Set([0]);
let selFase = new Set(['rec']);
let chartInstances = [];

/* ══════════════════════════════════════════════
   CHIPS — SUCURSALES
   ══════════════════════════════════════════════ */
const sucChipsEl = document.getElementById('suc-chips');
SUC.forEach((s, i) => {
  const chip = document.createElement('span');
  chip.className = 'chip' + (selSuc.has(i) ? ' active' : '');
  chip.style.color = s.color;
  chip.innerHTML = `<span class="cdot" style="background:${s.color}"></span>${s.name}`;
  chip.addEventListener('click', () => {
    if (selSuc.has(i) && selSuc.size === 1) return;
    selSuc.has(i) ? selSuc.delete(i) : selSuc.add(i);
    chip.classList.toggle('active', selSuc.has(i));
  });
  sucChipsEl.appendChild(chip);
});

/* ══════════════════════════════════════════════
   CHIPS — FASES
   ══════════════════════════════════════════════ */
const faseChipsEl = document.getElementById('fase-chips');
FASES.forEach(f => {
  const chip = document.createElement('span');
  chip.className = `chip ${f.tipo}` + (selFase.has(f.key) ? ' active' : '');
  chip.innerHTML = `<span class="cdot" style="background:${f.tipo==='buf'?'#a78bfa':'#4fc3f7'}"></span>${f.label}`;
  chip.addEventListener('click', () => {
    if (selFase.has(f.key) && selFase.size === 1) return;
    selFase.has(f.key) ? selFase.delete(f.key) : selFase.add(f.key);
    chip.classList.toggle('active', selFase.has(f.key));
  });
  faseChipsEl.appendChild(chip);
});

/* ══════════════════════════════════════════════
   FECHAS — defaults: últimos 7 días disponibles en la Sheet
   (los valores reales se setean tras cargar los datos, ver INIT al final)
   ══════════════════════════════════════════════ */
const fmtISO = d => d.toISOString().slice(0,10);
const desdeEl = document.getElementById('fecha-desde');
const hastaEl = document.getElementById('fecha-hasta');

/* ══════════════════════════════════════════════
   GENERAR REPORTE
   ══════════════════════════════════════════════ */
document.getElementById('gen-btn').addEventListener('click', generarReporte);

function generarReporte() {
  // Destroy previous charts
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  const desde = desdeEl.value;
  const hasta = hastaEl.value;
  if (!desde || !hasta || desde > hasta) {
    alert('Seleccioná un período válido.');
    return;
  }

  const dates   = dateRange(desde, hasta);
  const sucList  = [...selSuc].sort();
  const faseList = [...selFase].map(k => FASES.find(f => f.key === k)).filter(Boolean);

  const content = document.getElementById('content');
  content.innerHTML = '';

  // ── ENCABEZADO ──
  const header = document.createElement('div');
  header.className = 'card';
  const sucNames = sucList.map(i => SUC[i].name).join(', ');
  const faseNames = faseList.map(f => f.label).join(', ');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const [dy,dm,dd] = desde.split('-').map(Number);
  const [hy,hm,hd] = hasta.split('-').map(Number);
  header.innerHTML = `
    <div class="card-header">
      <span class="card-title">REPORTE OPERATIVO</span>
      <span class="card-sub">${dd} ${meses[dm-1]} ${dy} → ${hd} ${meses[hm-1]} ${hy} · ${dates.length} días</span>
    </div>
    <div style="display:flex;gap:2rem;flex-wrap:wrap;">
      <div><span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;">Sucursales</span><span style="font-size:13px;font-weight:600;">${sucNames}</span></div>
      <div><span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;">Fases</span><span style="font-size:13px;font-weight:600;">${faseNames}</span></div>
    </div>`;
  content.appendChild(header);

  // ── UN GRÁFICO POR FASE ──
  faseList.forEach(fase => {
    const card = document.createElement('div');
    card.className = 'card';

    const warnColor = '#f59e0b';
    const critColor = '#ef4444';
    // Para buffers: warn=75 (línea de atención), crit=90 (línea de saturado) — más alto es peor
    // Para flujos: crit=50 (línea de bajo/crítico), warn=90 (línea de medio/atención) — más bajo es peor
    const warnVal   = fase.tipo === 'buf' ? fase.umbrales.warn : fase.umbrales.crit;
    const critVal   = fase.tipo === 'buf' ? fase.umbrales.crit : fase.umbrales.warn;
    const warnLbl   = fase.tipo === 'buf' ? `Atención ≥${warnVal}%` : `Flujo medio <${warnVal}%`;
    const critLbl   = fase.tipo === 'buf' ? `Saturado ≥${critVal}%` : `Flujo bajo <${critVal}%`;

    // Summary KPIs — promedios
    const summaryItems = sucList.map(si => {
      const vals = dates.map(d => {
        const dd = ALL_DATES_DATA[d];
        if (!dd) return null;
        return getMetrica(dd, si, fase.key, fase.metrica);
      }).filter(v => v !== null);
      const avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
      return { suc: SUC[si], avg };
    });

    // Alert days count
    const alertDays = sucList.map(si => {
      let warn = 0, crit = 0;
      dates.forEach(d => {
        const dd = ALL_DATES_DATA[d];
        if (!dd) return;
        const val = getMetrica(dd, si, fase.key, fase.metrica);
        const lvl = alertLevel(val, fase);
        if (lvl === 'warn') warn++;
        if (lvl === 'crit') crit++;
      });
      return { suc: SUC[si], warn, crit, total: warn+crit };
    });

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${fase.label.toUpperCase()}</span>
        <span class="card-sub" style="color:${fase.tipo==='buf'?'#a78bfa':'#4fc3f7'}">${fase.tipo === 'buf' ? '▣ Buffer' : '▷ Flujo'} · ${fase.desc}</span>
      </div>

      <div class="summary-row">
        ${summaryItems.map(({suc,avg}) => `
          <div class="summary-kpi">
            <div class="skpi-val" style="color:${avg===null?'var(--dim)':(fase.tipo==='buf'?(avg>=fase.umbrales.crit?'#ef4444':avg>=fase.umbrales.warn?'#f59e0b':'#a78bfa'):(avg>=fase.umbrales.crit?'#22c55e':avg>=fase.umbrales.warn?'#f59e0b':'#ef4444'))}">${avg !== null ? avg+'%' : '—'}</div>
            <div class="skpi-lbl"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${suc.color};margin-right:5px;"></span>${suc.name}</div>
          </div>`).join('')}
      </div>

      <div class="thresh-note">
        <div class="thresh-item"><div class="thresh-line" style="background:${warnColor};opacity:.7;height:1px;border-top:2px dashed ${warnColor};background:transparent;width:20px;"></div>${warnLbl}</div>
        <div class="thresh-item"><div class="thresh-line" style="border-top:2px dashed ${critColor};width:20px;"></div>${critLbl}</div>
      </div>

      <div class="chart-wrap">
        <canvas id="chart-${fase.key}"></canvas>
      </div>

      <div class="divider"></div>

      <div style="margin-bottom:.6rem;">
        <span style="font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;">Días en alerta — ${dates.length} días analizados</span>
      </div>
      <table class="alert-table">
        <thead>
          <tr>
            <th>Sucursal</th>
            <th>Atención</th>
            <th>Crítico</th>
            <th>Total alertas</th>
            <th>% días en alerta</th>
          </tr>
        </thead>
        <tbody>
          ${alertDays.map(({suc, warn, crit, total}) => {
            const pct = dates.length ? Math.round(total/dates.length*100) : 0;
            return `<tr>
              <td><span class="suc-dot" style="background:${suc.color}"></span>${suc.name}</td>
              <td>${warn > 0 ? `<span class="badge-warn">${warn}d</span>` : `<span style="color:var(--dim);font-size:11px;">—</span>`}</td>
              <td>${crit > 0 ? `<span class="badge-crit">${crit}d</span>` : `<span style="color:var(--dim);font-size:11px;">—</span>`}</td>
              <td>${total > 0 ? `<span style="font-family:var(--mono);font-size:12px;font-weight:700;">${total}</span>` : `<span class="badge-ok">0</span>`}</td>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div style="flex:1;max-width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
                    <div style="width:${pct}%;height:100%;background:${pct>=50?'#ef4444':pct>=25?'#f59e0b':'#22c55e'};border-radius:2px;"></div>
                  </div>
                  <span style="font-family:var(--mono);font-size:10px;color:${pct>=50?'#ef4444':pct>=25?'#f59e0b':'#94a3b8'};">${pct}%</span>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;

    content.appendChild(card);

    // ── CHART.JS ──
    const ctx = card.querySelector(`#chart-${fase.key}`).getContext('2d');
    const labels = dates.map(fmtDate);

    const datasets = sucList.map(si => {
      const data = dates.map(d => {
        const dd = ALL_DATES_DATA[d];
        if (!dd) return null;
        return getMetrica(dd, si, fase.key, fase.metrica);
      });
      return {
        label: SUC[si].name,
        data,
        borderColor: SUC[si].color,
        backgroundColor: SUC[si].color + '18',
        borderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: SUC[si].color,
        tension: 0.35,
        spanGaps: true,
      };
    });

    // Threshold lines as datasets
    datasets.push({
      label: warnLbl,
      data: dates.map(() => warnVal),
      borderColor: warnColor,
      borderWidth: 1.5,
      borderDash: [5,4],
      pointRadius: 0,
      fill: false,
      tension: 0,
    });
    datasets.push({
      label: critLbl,
      data: dates.map(() => critVal),
      borderColor: critColor,
      borderWidth: 1.5,
      borderDash: [5,4],
      pointRadius: 0,
      fill: false,
      tension: 0,
    });

    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: {
            labels: {
              color: '#64748b',
              font: { family:"'DM Sans',sans-serif", size: 11 },
              boxWidth: 16, padding: 14,
              filter: item => !item.label.includes('<') && !item.label.includes('≥'),
            }
          },
          tooltip: {
            backgroundColor: '#111520',
            borderColor: '#252d3d',
            borderWidth: 1,
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            titleFont: { family:"'Space Mono',monospace", size:10 },
            bodyFont:  { family:"'Space Mono',monospace", size:10 },
            callbacks: {
              label: ctx => {
                if (ctx.dataset.borderDash) return null;
                return ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y+'%' : 'sin datos'}`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: '#1e2433' },
            ticks: { color:'#475569', font:{ family:"'Space Mono',monospace", size:9 } },
          },
          y: {
            min: 0, max: 100,
            grid: { color: '#1e2433' },
            ticks: {
              color:'#475569',
              font:{ family:"'Space Mono',monospace", size:9 },
              callback: v => v+'%',
              stepSize: 20,
            },
          }
        }
      }
    });

    chartInstances.push(chart);
  });
}

/* ══════════════════════════════════════════════
   CARGA DE DATOS — Google Sheets vía etman-data.js
   ══════════════════════════════════════════════ */
const genBtn = document.getElementById('gen-btn');

window.ETMAN.loadETMANData().then(data => {
  ALL_DATES_DATA = data.byDate;

  if (!data.latestDate) {
    genBtn.textContent = 'Sin datos en la hoja';
    document.getElementById('empty-state').textContent =
      'La hoja "datos_operativos" no tiene filas cargadas todavía.';
    return;
  }

  // Defaults: últimos 7 días disponibles, terminando en la fecha más reciente
  const latest = new Date(data.latestDate + 'T00:00:00');
  const earliest = new Date(latest.getTime() - 6*86400000);
  desdeEl.value = fmtISO(earliest);
  hastaEl.value = fmtISO(latest);
  desdeEl.max = data.latestDate;
  hastaEl.max = data.latestDate;

  genBtn.disabled = false;
  genBtn.textContent = 'Generar reporte';
}).catch(err => {
  console.error(err);
  genBtn.textContent = 'Error al cargar datos';
  document.getElementById('empty-state').textContent =
    `No se pudo leer la Google Sheet: ${err.message}`;
});

/* THEME TOGGLE */
const themeBtn   = document.getElementById('theme-toggle');
const themeIcon  = document.getElementById('theme-icon');
const themeLabel = document.getElementById('theme-label');

function applyTheme(light) {
  document.body.classList.toggle('light-mode', light);
  themeIcon.textContent = light ? '☀️' : '🌙';
  themeLabel.textContent = light ? 'Modo oscuro' : 'Modo claro';
  // Re-render charts so Chart.js picks up new grid/tick colors
  if (chartInstances.length) generarReporte();
}
const savedTheme = localStorage.getItem('etman-theme');
applyTheme(savedTheme === 'light');

themeBtn.addEventListener('click', () => {
  const isLight = !document.body.classList.contains('light-mode');
  applyTheme(isLight);
  localStorage.setItem('etman-theme', isLight ? 'light' : 'dark');
});
</script>
